<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль | QA Universe</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>
<!-- ФИКСИРОВАННЫЙ ХЕДЕР -->
<div class="fixed-header">
    <h1>QA Universe</h1>
    <div class="dropdown">
        <button class="dropbtn">
            <div class="avatar">
                <img th:src="@{/images/java-logo.png}" alt="Java" class="avatar-img">
            </div>
            <div class="avatar-info">
                <span class="avatar-name" th:text="${userName != null && userName != '' ? userName : 'Пользователь'}"></span>
                <span class="avatar-label">Профиль</span>
            </div>
            <span class="dropdown-arrow">▼</span>
        </button>
        <div class="dropdown-content">
            <a href="/profile">👤 Мой профиль</a>
            <a href="/main">🏠 На главную</a>
            <a href="/logout">🚪 Выйти</a>
        </div>
    </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="container">
    <div class="dashboard">
        <div class="profile-header">
            <h1>👤 Мой профиль</h1>
        </div>

        <div class="profile-section">
            <h2>Личные данные</h2>
            <div class="profile-grid">
                <div class="profile-item">
                    <label>Телефон</label>
                    <input type="text" id="phone" readonly>
                </div>
                <div class="profile-item">
                    <label>Имя</label>
                    <input type="text" id="fullName" placeholder="Введите ваше имя" maxlength="50">
                </div>
            </div>
            <button id="saveBtn" class="save-btn">💾 Сохранить изменения</button>
        </div>

        <div class="profile-section">
            <h2>Статистика</h2>
            <div class="stats-placeholder">
                <p>Тут может быть блок статистики</p>
            </div>
        </div>

        <div class="profile-section">
            <h2>Действия</h2>
            <div class="actions-grid">
                <a href="/roadmap" class="action-btn">📋 Roadmap</a>
                <a href="/collections" class="action-btn">📚 Коллекции</a>
                <a href="/mocks" class="action-btn">🧪 Mocks</a>
                <a href="/json-formatter" class="action-btn">📄 JSON Formatter</a>
            </div>
        </div>

        <p id="message" class="message" style="display: none;"></p>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
    // Загружаем данные профиля
    async function loadProfile() {
        try {
            const response = await fetch('/api/auth/profile');
            if (response.ok) {
                const data = await response.json();
                document.getElementById('phone').value = data.phone;
                document.getElementById('fullName').value = data.fullName || '';
            } else if (response.status === 401) {
                window.location.href = '/login';
            }
        } catch (error) {
            console.error('Ошибка загрузки профиля:', error);
        }
    }

    // Сохраняем изменения
    document.getElementById('saveBtn').addEventListener('click', async () => {
        let fullName = document.getElementById('fullName').value;
        const messageEl = document.getElementById('message');

        if (fullName) {
            fullName = fullName.trim();
        }

        try {
            const response = await fetch('/api/auth/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName: fullName })
            });

            if (response.ok) {
                const data = await response.json();
                messageEl.textContent = data.message;
                messageEl.style.color = '#00ff41';
                messageEl.style.display = 'block';
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 3000);
            } else {
                const error = await response.json();
                messageEl.textContent = 'Ошибка: ' + (error.error || 'неизвестная ошибка');
                messageEl.style.color = '#ff4c4c';
                messageEl.style.display = 'block';
            }
        } catch (error) {
            messageEl.textContent = 'Ошибка сети';
            messageEl.style.color = '#ff4c4c';
            messageEl.style.display = 'block';
        }
    });

    // Загружаем профиль при открытии страницы
    loadProfile();
</script>
</body>
</html>
