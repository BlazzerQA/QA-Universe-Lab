<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>JSON Formatter | QA Universe</title>
  <link rel="stylesheet" th:href="@{/css/json-formatter.css}">
</head>
<body>
<div class="floating-background"></div>

<!-- ФИКСИРОВАННЫЙ ХЕДЕР -->
<div class="fixed-header">
  <h1>QA Universe</h1>
  <div class="dropdown">
    <button class="dropbtn">
      <div class="avatar">
        <img th:src="@{/images/java-logo.png}" alt="Java" class="avatar-img">
      </div>
      <div class="avatar-info">
        <span class="avatar-name" th:text="${userName != null && userName != '' ? userName : 'Пользователь'}"></span>
        <span class="avatar-label">Профиль</span>
      </div>
      <span class="dropdown-arrow">▼</span>
    </button>
    <div class="dropdown-content">
      <a href="/profile">👤 Мой профиль</a>
      <a href="/main">🏠 На главную</a>
      <a href="/logout">🚪 Выйти</a>
    </div>
  </div>
</div>

<div class="container">
  <div>
    <h1>📦 JSON Formatter & Tree Viewer</h1>
  </div>
  <div class="editor-area">
    <div class="input-panel">
      <h3>✏️ Введите сырой JSON</h3>
      <textarea id="jsonInput" placeholder='Например: { "name": "QA", "tools": ["Postman", "RestAssured"] }'></textarea>
      <div class="button-group">
        <button id="formatBtn" class="btn btn-primary">🎨 Отформатировать</button>
        <button id="clearBtn" class="btn btn-danger">🗑 Очистить</button>
        <button id="exampleBtn" class="btn btn-primary">📋 Пример</button>
      </div>
      <div id="errorMsg" class="error-message"></div>
    </div>
    <div class="output-panel">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>🌳 Древовидная структура</h3>
        <button
                id="togglePanelBtn"
                class="toggle-panel-btn"
                title="Свернуть/развернуть левую панель">◀ Скрыть редактор JSON
        </button>
      </div>

      <div id="jsonTreeContainer" class="json-viewer">
        <i style="color: #888;">Здесь появится дерево после форматирования</i>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/json-formatter.js}"></script>
</body>
</html>
