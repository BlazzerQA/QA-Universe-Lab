<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>QA Universe | Login</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">

</head>

<body>
<canvas id="codeCanvas"></canvas>
<div class="login-card">
  <h1>QA Universe Auth</h1>
  <form th:action="@{/login}" th:object="${loginRequest}" method="post">
    <div class="form-group">
      <label>Телефон:</label>
      <input type="text" th:field="*{phone}" placeholder="+79991234567">
      <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: #ff4c4c; font-size: 0.8rem;"></p>
    </div>
    <div class="form-group">
      <label>Пароль (qwerty):</label>
      <input type="password" th:field="*{password}">
      <p th:if="${error}" th:text="${error}" style="color: #ff4c4c; font-size: 0.8rem;"></p>
    </div>
    <button type="submit">LOGIN</button>
  </form>
</div>
<script th:src="@{/js/matrix-bg.js}"></script>
</body>
</html>
