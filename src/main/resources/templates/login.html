<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>QA Universe | Login</title>
  <style>
    body {
        background-color: #121212;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .login-card {
        background-color: #1e1e1e;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        width: 300px;
        border: 1px solid #333;
    }
    h1 { color: #00ff41; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #bbb; }
    input {
        width: 100%;
        padding: 10px;
        background: #2c2c2c;
        border: 1px solid #444;
        border-radius: 4px;
        color: #fff;
        box-sizing: border-box;
    }
    input:focus { border-color: #00ff41; outline: none; }
    button {
        width: 100%;
        padding: 10px;
        background-color: #00ff41;
        border: none;
        border-radius: 4px;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }
    button:hover { background-color: #00cc33; }
  </style>
</head>
<body>
<div class="login-card">
  <h1>QA Universe Auth</h1>
  <form th:action="@{/login}" th:object="${loginRequest}" method="post">
    <div class="form-group">
      <label>Телефон:</label>
      <input type="text" th:field="*{phone}" placeholder="+79991234567">
      <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: #ff4c4c; font-size: 0.8rem;"></p>
    </div>
    <div class="form-group">
      <label>Пароль (qwerty):</label>
      <input type="password" th:field="*{password}">
      <p th:if="${error}" th:text="${error}" style="color: #ff4c4c; font-size: 0.8rem;"></p>
    </div>
    <button type="submit">LOGIN</button>
  </form>
</div>
</body>
</html>
